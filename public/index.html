<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Tool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7a00, #1a1a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff7a00;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 10px;
    }

    .error {
      background: #ffd6d6;
      color: red;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
    }

    .success {
      color: green;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>OTP Tool</h2>

  <label>Dịch vụ</label>
  <select id="service">
    <option value="lf">TikTok</option>
  </select>

  <label>Quốc gia</label>
  <select id="country">
    <option value="6">🇮🇩 Indonesia (+62)</option>
  </select>

  <button onclick="getNumber()">Lấy số điện thoại</button>

  <div class="box">
    <b>Số điện thoại:</b>
    <div id="phone">---</div>
  </div>

  <div class="box">
    <b>OTP:</b>
    <div id="otp">----</div>
  </div>

  <div id="error" class="error" style="display:none"></div>
</div>

<script>
const TOKEN = "iphone1"; // phải trùng APP_TOKENS

let currentId = null;

function showError(msg) {
  const el = document.getElementById("error");
  el.style.display = "block";
  el.innerText = msg;
}

function clearError() {
  const el = document.getElementById("error");
  el.style.display = "none";
}

async function getNumber() {
  clearError();
  document.getElementById("phone").innerText = "Đang lấy...";
  document.getElementById("otp").innerText = "----";

  try {
    const res = await fetch("/api/rent?token=" + TOKEN, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service: document.getElementById("service").value,
        country: document.getElementById("country").value
      })
    });

    const data = await res.json();

    if (!data.ok) {
      showError(data.error || "Lỗi lấy số");
      document.getElementById("phone").innerText = "Không có số";
      return;
    }

    currentId = data.id;
    document.getElementById("phone").innerText = data.phone;

    checkOTP();

  } catch (e) {
    showError("Lỗi kết nối server");
  }
}

async function checkOTP() {
  if (!currentId) return;

  try {
    const res = await fetch(`/api/status?id=${currentId}&token=${TOKEN}`);
    const data = await res.json();

    if (data.status === "ok") {
      document.getElementById("otp").innerText = data.code;
      return;
    }

    setTimeout(checkOTP, 5000);

  } catch (e) {
    setTimeout(checkOTP, 5000);
  }
}
</script>

</body>
</html>
