<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OTP Tool</title>
</head>
<body>
  <h2>OTP Tool</h2>

  <select id="country">
    <option value="6">Indonesia (+62)</option>
    <option value="16">UK (+44)</option>
  </select>

  <button onclick="getNumber()">Lấy số</button>

  <p id="phone"></p>
  <p id="otp"></p>

<script>
const token = "iphone1";
let id = null;

async function getNumber() {
  const country = document.getElementById("country").value;

  const res = await fetch(`/api/rent?token=${token}`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ country })
  });

  const data = await res.json();
  document.getElementById("phone").innerText = data.phone;

  id = data.id;
  checkOTP();
}

async function checkOTP() {
  const res = await fetch(`/api/status?id=${id}&token=${token}`);
  const data = await res.json();

  if (data.code) {
    document.getElementById("otp").innerText = data.code;
  } else {
    setTimeout(checkOTP, 3000);
  }
}
</script>
</body>
</html>
