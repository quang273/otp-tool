<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OTP Tool</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff7a00,#111827);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:340px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.main { background:#ff7a00;color:#fff; }
.dark { background:#111827;color:#fff; }
.red { background:#dc2626;color:#fff; }

.box {
  margin-top:12px;
  padding:12px;
  background:#f3f4f6;
  border-radius:12px;
}

.phone { font-size:20px;font-weight:bold; }
.otp { font-size:30px;color:#16a34a;font-weight:bold; }

.status {
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#fff7ed;
}
.ok { background:#dcfce7;color:#166534; }
.err { background:#fee2e2;color:#991b1b; }
</style>
</head>

<body>

<div class="card">
  <h3>OTP Tool</h3>

  <button class="main" onclick="getNumber()">Lấy số</button>

  <div class="box">
    <div>Số điện thoại</div>
    <div id="phone" class="phone">---</div>

    <button class="dark" onclick="copyPhone()">Copy số (bỏ +62)</button>
    <button class="red" onclick="cancelNumber()">HỦY SỐ</button>
  </div>

  <div class="box">
    <div>OTP</div>
    <div id="otp" class="otp">----</div>
  </div>

  <div id="status" class="status">Sẵn sàng</div>
</div>

<script>
const TOKEN = "iphone1";

let currentId = localStorage.getItem("id");
let currentPhone = localStorage.getItem("phone");

function setStatus(t, type=""){
  const el = document.getElementById("status");
  el.className = "status " + type;
  el.innerText = t;
}

function save(){
  localStorage.setItem("id", currentId);
  localStorage.setItem("phone", currentPhone);
}

function clear(){
  localStorage.removeItem("id");
  localStorage.removeItem("phone");
}

function showPhone(){
  if(!currentPhone) return;
  document.getElementById("phone").innerText = "+62" + currentPhone;
}

async function getNumber(){
  setStatus("Đang lấy số...");
  document.getElementById("otp").innerText="----";

  try{
    const res = await fetch("/api/rent?token="+TOKEN,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        service:"lf",
        country:"6"
      })
    });

    const data = await res.json();

    if(!data.ok){
      setStatus(data.error,"err");
      return;
    }

    currentId = data.id;
    currentPhone = data.phone.replace(/^62/, ""); // bỏ 62 gốc

    save();
    showPhone();

    setStatus("Đã có số, chờ OTP...");
    checkOTP();

  }catch{
    setStatus("Lỗi server","err");
  }
}

async function checkOTP(){
  if(!currentId) return;

  try{
    const res = await fetch(`/api/status?id=${currentId}&token=${TOKEN}`);
    const data = await res.json();

    if(data.code){
      document.getElementById("otp").innerText = data.code;
      setStatus("Đã nhận OTP","ok");
      return;
    }

    setTimeout(checkOTP,4000);

  }catch{
    setTimeout(checkOTP,4000);
  }
}

async function cancelNumber(){
  if(!currentId){
    setStatus("Không có số để hủy","err");
    return;
  }

  try{
    await fetch("/api/cancel?token="+TOKEN,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ id: currentId })
    });

    setStatus("Đã hủy số","ok");

    currentId=null;
    currentPhone=null;
    clear();

    document.getElementById("phone").innerText="---";
    document.getElementById("otp").innerText="----";

  }catch{
    setStatus("Hủy lỗi","err");
  }
}

function copyPhone(){
  if(!currentPhone) return;
  navigator.clipboard.writeText(currentPhone);
  setStatus("Đã copy số (không có +62)","ok");
}

// reload vẫn giữ
if(currentPhone){
  showPhone();
  checkOTP();
}
</script>

</body>
</html>
