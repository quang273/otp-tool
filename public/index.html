<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Tool</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7a00, #111827);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #111827;
    }
    .app {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }
    .sub {
      color: #6b7280;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin: 14px 0 7px;
    }
    select, button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      border: 1px solid #d1d5db;
    }
    button {
      margin-top: 18px;
      border: none;
      background: #ff7900;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: .6;
    }
    .box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #f3f4f6;
    }
    .title {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .phone {
      font-size: 24px;
      font-weight: bold;
      word-break: break-all;
    }
    .otp {
      font-size: 36px;
      font-weight: 900;
      color: #16a34a;
      letter-spacing: 3px;
    }
    .status {
      margin-top: 12px;
      padding: 11px;
      border-radius: 12px;
      background: #fff7ed;
      color: #c2410c;
      font-weight: bold;
      text-align: center;
    }
    .ok {
      background: #dcfce7;
      color: #166534;
    }
    .err {
      background: #fee2e2;
      color: #991b1b;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .dark {
      background: #111827;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>OTP Tool</h1>
    <div class="sub">Chọn dịch vụ + quốc gia rồi bấm lấy số</div>

    <label>Dịch vụ</label>
    <select id="service">
      <option value="tt">TikTok</option>
      <option value="tg">Telegram</option>
      <option value="wa">WhatsApp</option>
      <option value="fb">Facebook</option>
      <option value="go">Google / Gmail</option>
      <option value="ig">Instagram</option>
    </select>

    <label>Quốc gia</label>
    <select id="country">
      <option value="6">🇮🇩 Indonesia (+62)</option>
      <option value="16">🇬🇧 United Kingdom (+44)</option>
      <option value="52">🇹🇭 Thailand (+66)</option>
      <option value="36">🇨🇦 Canada (+1)</option>
    </select>

    <button id="rentBtn" onclick="getNumber()">Lấy số điện thoại</button>

    <div class="box">
      <div class="title">Số điện thoại</div>
      <div class="phone" id="phone">Chưa có số</div>
      <div class="row">
        <button class="dark" onclick="copyText('phone')">Copy số</button>
        <button class="dark" onclick="getNumber()">Lấy số mới</button>
      </div>
    </div>

    <div class="box">
      <div class="title">OTP</div>
      <div class="otp" id="otp">----</div>
      <button class="dark" onclick="copyText('otp')">Copy OTP</button>
    </div>

    <div id="status" class="status">Sẵn sàng</div>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token") || "iphone1";

let id = null;
let timer = null;

function setStatus(text, type = "") {
  const el = document.getElementById("status");
  el.className = "status " + type;
  el.innerText = text;
}

async function getNumber() {
  clearTimeout(timer);

  const country = document.getElementById("country").value;
  const service = document.getElementById("service").value;
  const btn = document.getElementById("rentBtn");

  btn.disabled = true;
  document.getElementById("phone").innerText = "Đang lấy số...";
  document.getElementById("otp").innerText = "----";
  setStatus("Đang thuê số...");

  try {
    const res = await fetch(`/api/rent?token=${token}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ country, service })
    });

    const data = await res.json();

    if (!data.ok) {
      document.getElementById("phone").innerText = "Không lấy được số";
      setStatus(data.error || "Lỗi API", "err");
      btn.disabled = false;
      return;
    }

    id = data.id;
    document.getElementById("phone").innerText = "+" + String(data.phone).replace("+", "");
    setStatus("Đã có số, đang chờ OTP...");
    btn.disabled = false;

    checkOTP();
  } catch (e) {
    setStatus("Lỗi kết nối server", "err");
    btn.disabled = false;
  }
}

async function checkOTP() {
  if (!id) return;

  const res = await fetch(`/api/status?id=${id}&token=${token}`);
  const data = await res.json();

  if (data.code) {
    document.getElementById("otp").innerText = data.code;
    setStatus("Đã nhận OTP", "ok");
    return;
  }

  setStatus("Đang chờ OTP...");
  timer = setTimeout(checkOTP, 4000);
}

function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
}
</script>
</body>
</html>
